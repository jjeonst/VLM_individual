# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: objectnav
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgb_agent
  - /habitat/dataset/objectnav: hm3d
  - _self_

habitat:
  environment:
    max_episode_steps: 500

  dataset:
    split: train
    data_path: data/topovlm/habitat/datasets/objectnav/hm3d/v2/objectnav_hm3d_v2/{split}/{split}.json.gz

  simulator:
    turn_angle: 30
    action_space_config: v1
    scene_dataset: data/topovlm/habitat/scene_datasets/hm3d/hm3d_annotated_basis.scene_dataset_config.json
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 0.88, 0]
        height: 0.88
        radius: 0.18
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: false
