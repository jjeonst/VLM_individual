data:
  dataset_name: habitat_objectnav_hm3d
  domain: habitat
  cache_format: single_action_graph
  data_root: /data/topovlm/habitat
  habitat_config: configs/habitat/pr2l_objectnav.yaml
  split: train
  objectnav_dataset_dir: datasets/objectnav/hm3d/v2/objectnav_hm3d_v2
  scene_dataset_dir: scene_datasets/hm3d
  scene_dataset_config: scene_datasets/hm3d/hm3d_annotated_basis.scene_dataset_config.json
  episodes_manifest: episodes/train/manifest.jsonl
  graph_manifest: graphs/prismatic_objectnav_train/manifest.jsonl
  graph_cache_dir: graphs/prismatic_objectnav_train
  embeddings_dir: embeddings/prismatic_objectnav_train
  vlm_weights_dir: /data/topovlm/vlm_weights/prismatic
  image_key: rgb
  image_height: 224
  image_width: 224
  action_key: action
  goal_key: goal_text
  frame_stride: 1
  max_episodes: null
  batch_size: 16
  num_workers: 4
  pin_memory: true
  synthetic_debug: false
  require_existing_cache: true
