defaults:
  - train: pr2l_habitat_bc_faithful
  - data: pr2l_habitat_web
  - model: pr2l_prismatic_faithful
  - objectives: pr2l_bc_faithful
  - eval: default

config_name: habitat/pr2l_habitat_bc_balanced_subset_staged
run_name: pr2l_habitat_bc_balanced_subset
max_epochs: 40
gradient_accumulation_steps: 8
data:
  data_root: data/topovlm/habitat
  dataset_name: pr2l_habitat_web_balanced_subset
  episode_selection_manifest: episode_selections/pr2l_habitat_web/train_scene_object_balanced.jsonl
  balanced_subset_size: 560
  episodes_manifest: episodes/pr2l_habitat_web_balanced_subset/train/manifest.jsonl
  graph_manifest: graphs/pr2l_habitat_bc_balanced_subset/train/manifest.jsonl
  graph_cache_dir: graphs/pr2l_habitat_bc_balanced_subset/train
  embeddings_dir: embeddings/pr2l_habitat_bc_balanced_subset/train
model:
  vlm:
    weights_path: data/topovlm/vlm_weights/prismatic/prism-dinosiglip+7b
    projection_path: embeddings/pr2l_habitat_bc_balanced_subset/projection_pca.npz
