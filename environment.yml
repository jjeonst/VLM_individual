name: topovlm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - cmake=3.27
  - pytorch=2.2.0
  - torchvision=0.17.0
  - torchaudio=2.2.0
  - pytorch-cuda=11.8
  - mkl<2025
  - intel-openmp<2025
  - pip:
      - -e .[dev]
      - transformers==4.38.1
      - huggingface-hub<1.0
      - prismatic @ git+https://github.com/TRI-ML/prismatic-vlms.git
