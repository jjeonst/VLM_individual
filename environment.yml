name: topovlm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - aihabitat
  - defaults
dependencies:
  - python=3.9
  - pip
  - cmake=3.27
  - habitat-sim=0.3.3
  - withbullet
  - pytorch::pytorch=2.2.0
  - pytorch::torchvision=0.17.0
  - pytorch::torchaudio=2.2.0
  - pytorch::pytorch-cuda=11.8
  - mkl<2025
  - intel-openmp<2025
  - pip:
      - -e .[dev,habitat]
      - transformers==4.38.1
      - huggingface-hub<1.0
      - prismatic @ git+https://github.com/TRI-ML/prismatic-vlms.git
